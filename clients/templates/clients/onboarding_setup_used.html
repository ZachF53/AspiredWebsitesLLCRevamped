{% extends "base.html" %}

{% block title %}Account already set up — Aspired Websites{% endblock %}

{% block content %}
<section class="onboarding-setup">
    <div class="container container--narrow">
        <div class="onboarding-setup__card onboarding-setup__card--info">
            <h1 class="onboarding-setup__title">Your account is already set up.</h1>
            <p class="onboarding-setup__sub">
                The setup link can only be used once. Sign in to access your portal.
            </p>
            <a href="{% url 'public:login' %}" class="btn btn-primary onboarding-setup__submit">Log In &rarr;</a>
        </div>
    </div>
</section>
{% endblock %}
