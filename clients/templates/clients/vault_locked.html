{% extends "clients/base.html" %}
{% load static %}

{% block title %}Credentials{% endblock %}

{% block portal_content %}
<header class="portal-page-head">
    <h1>Credentials</h1>
</header>

<div class="vault-gate">
    <div class="vault-gate__card">
        <div class="vault-icon vault-icon--danger" aria-hidden="true">
            <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/><line x1="12" y1="15" x2="12" y2="18"/></svg>
        </div>
        <h1>Too Many Attempts</h1>
        <p class="vault-gate__sub">For your security, credential access is locked.</p>
        <p class="vault-locked-timer">
            Try again in:
            <strong id="pvault-lockout-countdown" data-until="{{ lockout_until }}">—</strong>
        </p>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="{% static 'js/portal-vault.js' %}" defer></script>
{% endblock %}
