{% if fallback %}
    <div class="ai-review-fallback">{{ fallback }}</div>
{% else %}
    <div class="ai-review-body">
        {% for paragraph in review_paragraphs %}
            {% if paragraph %}<p>{{ paragraph }}</p>{% endif %}
        {% endfor %}
    </div>
    <p class="ai-review-attribution">Aspired Websites AI Agents</p>
{% endif %}
