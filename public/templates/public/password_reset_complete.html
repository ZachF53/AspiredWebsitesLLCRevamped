{% extends "base.html" %}
{% load static %}

{% block title %}Password Reset — Aspired Websites{% endblock %}

{% block content %}
<section class="section login-page">
    <div class="container">
        <article class="card card--featured login-card">
            <a class="login-card__logo" href="{% url 'public:home' %}" aria-label="Aspired Websites — Home">
                <img src="{% static 'images/logo.png' %}" alt="Aspired Websites" width="122" height="56">
            </a>
            <span class="eyebrow">Account Recovery</span>
            <h1 class="login-card__title">Password updated</h1>
            <p class="login-card__subtitle">Your password has been changed. You can sign in now.</p>

            <p class="login-helper">
                <a class="btn-primary btn-block" href="{% url 'public:login' %}">Sign in &rarr;</a>
            </p>
        </article>
    </div>
</section>
{% endblock %}
